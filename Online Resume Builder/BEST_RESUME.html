<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEST_RESUME</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0ece6; /* Matches screenshot background */
        }
        
        .font-serif-name {
            font-family: 'Playfair Display', serif;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Print Styles - crucial for exporting to PDF */
        @media print {
            body { 
                background: white; 
                margin: 0; 
                padding: 0;
            }
            #header-bar, #editor-panel { 
                display: none !important; 
            }
            #preview-panel {
                width: 100% !important;
                padding: 0 !important;
                background: white !important;
                overflow: visible !important;
                height: auto !important;
            }
            #resume-preview {
                box-shadow: none !important;
                width: 100% !important;
                max-width: 100% !important;
                margin: 0 !important;
                padding: 20mm !important; /* Standard print margins */
            }
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            @page {
            size: A4;
            margin: 0;
        }
    }
    
    .section-title {
        color: #d97743; /* Match screenshot orange */
        border-bottom: 1px solid #d97743;
        padding-bottom: 8px;
        margin-bottom: 16px;
        text-transform: uppercase;
        font-size: 0.8rem;
        letter-spacing: 0.05em;
        font-weight: 600;
    }

    .tab-active {
        color: #d97743 !important;
        border-bottom-color: #d97743 !important;
    }

    /* Hide scrollbar for mobile tabs */
    .scrollbar-hide::-webkit-scrollbar {
        display: none;
    }
    .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
    }
</style>
</head>
<body class="flex flex-col min-h-screen md:h-screen md:overflow-hidden">

    <!-- Header / Navbar -->
    <header id="header-bar" class="bg-[#1a1714] px-6 py-3 flex justify-between items-center shadow-sm z-20">
        <div class="flex items-center gap-2">
            <svg class="w-6 h-6 text-[#d97743]" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            <h1 class="text-xl font-bold text-white">BEST_<span class="text-[#d97743]">RESUME</span></h1>
        </div>
        <div class="flex gap-3">
            <button onclick="downloadWord()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-1.5 rounded text-sm font-medium transition flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                Word
            </button>
            <button onclick="window.print()" class="bg-[#d97743] hover:bg-[#c66632] text-white px-4 py-1.5 rounded text-sm font-medium transition flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                PDF
            </button>
        </div>
    </header>

    <!-- Main Workspace -->
    <main class="flex flex-1 flex-col md:flex-row md:overflow-hidden relative">
        
        <!-- Editor Panel (Left) -->
        <section id="editor-panel" class="w-full md:w-1/3 lg:w-[400px] bg-white border-b md:border-b-0 md:border-r border-gray-200 flex flex-col z-10 shadow-[4px_0_24px_rgba(0,0,0,0.02)] md:h-full">
            
            <!-- Tabs -->
            <div class="flex border-b border-gray-200 text-[11px] font-bold text-gray-400 uppercase overflow-x-auto whitespace-nowrap scrollbar-hide">
                <button onclick="switchTab('basics')" id="tab-basics" class="tab-btn tab-active px-4 py-4 border-b-2 border-transparent hover:text-gray-700 transition flex-1">Basics</button>
                <button onclick="switchTab('experience')" id="tab-experience" class="tab-btn px-4 py-4 border-b-2 border-transparent hover:text-gray-700 transition flex-1">Experience</button>
                <button onclick="switchTab('education')" id="tab-education" class="tab-btn px-4 py-4 border-b-2 border-transparent hover:text-gray-700 transition flex-1">Education</button>
                <button onclick="switchTab('projects')" id="tab-projects" class="tab-btn px-4 py-4 border-b-2 border-transparent hover:text-gray-700 transition flex-1">Projects</button>
                <button onclick="switchTab('skills')" id="tab-skills" class="tab-btn px-4 py-4 border-b-2 border-transparent hover:text-gray-700 transition flex-1">Skills</button>
            </div>

            <!-- Scrollable Content -->
            <div class="flex-1 md:overflow-y-auto p-6">
                
                <!-- TAB: Basics -->
                <div id="content-basics" class="tab-content space-y-6">
                    <h2 class="text-xs font-bold text-gray-500 uppercase tracking-wide mb-4">Personal Information</h2>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">First Name</label>
                            <input type="text" id="inp-firstname" oninput="updateState('firstName', this.value)" class="w-full p-2.5 text-sm bg-white border border-gray-200 rounded-md focus:ring-1 focus:ring-[#d97743] focus:border-[#d97743] outline-none transition">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">Last Name</label>
                            <input type="text" id="inp-lastname" oninput="updateState('lastName', this.value)" class="w-full p-2.5 text-sm bg-white border border-gray-200 rounded-md focus:ring-1 focus:ring-[#d97743] focus:border-[#d97743] outline-none transition">
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">Professional Title</label>
                        <input type="text" id="inp-title" oninput="updateState('title', this.value)" class="w-full p-2.5 text-sm bg-white border border-gray-200 rounded-md focus:ring-1 focus:ring-[#d97743] focus:border-[#d97743] outline-none transition">
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">Email</label>
                        <input type="email" id="inp-email" oninput="updateState('email', this.value)" class="w-full p-2.5 text-sm bg-blue-50 border border-blue-200 rounded-md focus:ring-1 focus:ring-[#d97743] focus:border-[#d97743] outline-none transition">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">Phone</label>
                            <input type="text" id="inp-phone" oninput="updateState('phone', this.value)" class="w-full p-2.5 text-sm bg-white border border-gray-200 rounded-md focus:ring-1 focus:ring-[#d97743] focus:border-[#d97743] outline-none transition">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">Location</label>
                            <input type="text" id="inp-location" oninput="updateState('location', this.value)" class="w-full p-2.5 text-sm bg-white border border-[#d97743] rounded-md focus:ring-1 focus:ring-[#d97743] outline-none transition shadow-[0_0_0_1px_rgba(217,119,67,0.2)]">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">LinkedIn</label>
                            <input type="text" id="inp-linkedin" oninput="updateState('linkedin', this.value)" class="w-full p-2.5 text-sm bg-white border border-gray-200 rounded-md focus:ring-1 focus:ring-[#d97743] focus:border-[#d97743] outline-none transition">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">Website / Portfolio</label>
                            <input type="text" id="inp-website" oninput="updateState('website', this.value)" class="w-full p-2.5 text-sm bg-white border border-gray-200 rounded-md focus:ring-1 focus:ring-[#d97743] focus:border-[#d97743] outline-none transition">
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">Professional Summary</label>
                        <textarea id="inp-summary" placeholder="A brief statement about your professional identity..." oninput="updateState('summary', this.value)" rows="4" class="w-full p-2.5 text-sm bg-white border border-gray-200 rounded-md focus:ring-1 focus:ring-[#d97743] focus:border-[#d97743] outline-none transition resize-y"></textarea>
                    </div>
                </div>

                <!-- TAB: Experience -->
                <div id="content-experience" class="tab-content hidden space-y-6">
                    <div class="flex justify-between items-center">
                        <h2 class="text-xs font-bold text-gray-500 uppercase tracking-wide">Work Experience</h2>
                        <button onclick="addExp()" class="text-xs text-[#d97743] hover:text-[#c66632] font-bold flex items-center gap-1">+ Add New</button>
                    </div>
                    <div id="experience-editor-container" class="space-y-4"></div>
                </div>

                <!-- TAB: Education -->
                <div id="content-education" class="tab-content hidden space-y-6">
                    <div class="flex justify-between items-center">
                        <h2 class="text-xs font-bold text-gray-500 uppercase tracking-wide">Education</h2>
                        <button onclick="addEdu()" class="text-xs text-[#d97743] hover:text-[#c66632] font-bold flex items-center gap-1">+ Add New</button>
                    </div>
                    <div id="education-editor-container" class="space-y-4"></div>
                </div>

                <!-- TAB: Projects -->
                <div id="content-projects" class="tab-content hidden space-y-6">
                    <div class="flex justify-between items-center">
                        <h2 class="text-xs font-bold text-gray-500 uppercase tracking-wide">Projects</h2>
                        <button onclick="addProject()" class="text-xs text-[#d97743] hover:text-[#c66632] font-bold flex items-center gap-1">+ Add New</button>
                    </div>
                    <div id="projects-editor-container" class="space-y-4"></div>
                </div>

                <!-- TAB: Skills -->
                <div id="content-skills" class="tab-content hidden space-y-6">
                    <h2 class="text-xs font-bold text-gray-500 uppercase tracking-wide mb-4">Skills & Additional</h2>
                    
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">Skills (Comma Separated)</label>
                        <textarea id="inp-skills" oninput="updateState('skills', this.value)" rows="3" class="w-full p-2.5 text-sm bg-white border border-gray-200 rounded-md focus:ring-1 focus:ring-[#d97743] outline-none transition resize-none"></textarea>
                    </div>

                    <div class="mt-6 border-t border-gray-100 pt-6">
                        <div class="flex justify-between items-center mb-4">
                            <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider">Additional Sections</label>
                            <button onclick="addAdditional()" class="text-xs text-[#d97743] hover:text-[#c66632] font-bold flex items-center gap-1">+ Add New</button>
                        </div>
                        <div id="additional-editor-container" class="space-y-4"></div>
                    </div>
                </div>

            </div>
        </section>

        <!-- Live Preview Panel (Right) -->
        <section id="preview-panel" class="w-full md:w-auto flex-1 bg-[#f0ece6] md:overflow-y-auto flex flex-col items-center pb-12">
            
            <!-- Preview Control Bar -->
            <div class="w-full max-w-[21cm] mt-6 px-4 py-2 bg-white rounded flex justify-between items-center border border-gray-200 shadow-sm print:hidden">
                <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Live Preview</span>
                <div class="hidden md:flex items-center gap-3">
                    <button onclick="adjustZoom(-0.1)" class="text-gray-400 hover:text-[#d97743] transition outline-none" title="Zoom Out">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM13 10H7"></path></svg>
                    </button>
                    <input type="range" id="zoom-slider" min="0.4" max="1.5" step="0.05" value="0.85" oninput="setZoom(this.value)" class="w-24 h-1 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-[#d97743]">
                    <button onclick="adjustZoom(0.1)" class="text-gray-400 hover:text-[#d97743] transition outline-none" title="Zoom In">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v6m3-3H7"></path></svg>
                    </button>
                    <span id="zoom-level-text" class="text-xs font-bold text-gray-500 w-10 text-right">85%</span>
                </div>
            </div>

            <!-- Scalable Wrapper -->
            <div class="w-full max-w-[21cm] origin-top mt-4 mb-10">
                <div id="preview-wrapper" class="w-full transform-origin-top transition-transform duration-300 origin-top" style="transform: scale(0.85);">
                    <!-- A4 Document Container -->
                    <div id="resume-preview" class="bg-white shadow-md w-full min-h-[29.7cm] p-10 md:p-16 text-gray-800 text-sm leading-relaxed">
                        <!-- Preview Content Injected Here via JS -->
                    </div>
                </div>
            </div>

        </section>
    </main>

    <script>
        // --- State Management ---
        const state = {
            firstName: '',
            lastName: '',
            title: '',
            email: '',
            phone: '',
            location: '',
            linkedin: '',
            website: '',
            summary: '',
            experiences: [],
            educations: [],
            skills: '',
            additionals: [],
            projects: []
        };

        // --- UI Interaction Functions ---
        function switchTab(tabId) {
            // Update buttons
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('tab-active');
            });
            document.getElementById(`tab-${tabId}`).classList.add('tab-active');

            // Update content visibility
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.add('hidden');
            });
            document.getElementById(`content-${tabId}`).classList.remove('hidden');
        }

        let currentZoom = 0.85;

        function setZoom(scale) {
            currentZoom = parseFloat(scale);
            const wrapper = document.getElementById('preview-wrapper');
            if (wrapper) wrapper.style.transform = `scale(${currentZoom})`;
            
            // Sync slider and text UI
            const slider = document.getElementById('zoom-slider');
            if (slider && slider.value != currentZoom) slider.value = currentZoom;
            
            const text = document.getElementById('zoom-level-text');
            if (text) text.innerText = `${Math.round(currentZoom * 100)}%`;
        }

        function adjustZoom(delta) {
            let newZoom = currentZoom + delta;
            newZoom = Math.max(0.4, Math.min(1.5, newZoom)); // Clamp between 40% and 150%
            setZoom(newZoom);
        }

        function downloadWord() {
            const preHtml = "<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><title>Resume Export</title><style>body { font-family: 'Arial', sans-serif; } .section-title { color: #d97743; border-bottom: 1px solid #d97743; padding-bottom: 8px; margin-bottom: 16px; text-transform: uppercase; font-size: 14px; font-weight: bold; }</style></head><body>";
            const postHtml = "</body></html>";
            
            // Get the HTML content of the resume preview
            const content = document.getElementById('resume-preview').innerHTML;
            
            const html = preHtml + content + postHtml;
            const blob = new Blob(['\ufeff', html], {
                type: 'application/msword'
            });
            
            // Create a URL for the blob
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            
            // Set file name based on user's name or default
            const fileName = state.firstName ? `${state.firstName}_Resume.doc` : 'Resume.doc';
            link.download = fileName;
            
            // Trigger download
            document.body.appendChild(link);
            link.click();
            
            // Clean up
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        // --- Core Functions ---

        function updateState(key, value) {
            state[key] = value;
            renderPreview();
        }

        // Experience Functions
        function updateExp(index, key, value) {
            state.experiences[index][key] = value;
            renderPreview();
        }

        function addExp() {
            state.experiences.push({ title: '', company: '', date: '', description: '' });
            renderExpEditor();
            renderPreview();
        }

        function removeExp(index) {
            state.experiences.splice(index, 1);
            renderExpEditor();
            renderPreview();
        }

        // Education Functions
        function updateEdu(index, key, value) {
            state.educations[index][key] = value;
            renderPreview();
        }

        function addEdu() {
            state.educations.push({ degree: '', school: '', date: '' });
            renderEduEditor();
            renderPreview();
        }

        function removeEdu(index) {
            state.educations.splice(index, 1);
            renderEduEditor();
            renderPreview();
        }

        // Additional Details Functions
        function updateAdditional(index, key, value) {
            state.additionals[index][key] = value;
            renderPreview();
        }

        function addAdditional() {
            state.additionals.push({ category: '', details: '' });
            renderAdditionalEditor();
            renderPreview();
        }

        function removeAdditional(index) {
            state.additionals.splice(index, 1);
            renderAdditionalEditor();
            renderPreview();
        }

        // Projects Functions
        function updateProject(index, key, value) {
            state.projects[index][key] = value;
            renderPreview();
        }

        function addProject() {
            state.projects.push({ title: '', link: '', description: '' });
            renderProjectEditor();
            renderPreview();
        }

        function removeProject(index) {
            state.projects.splice(index, 1);
            renderProjectEditor();
            renderPreview();
        }

        // --- Render Functions ---

        // Render Initial Editor Inputs
        function initEditor() {
            document.getElementById('inp-firstname').value = state.firstName;
            document.getElementById('inp-lastname').value = state.lastName;
            document.getElementById('inp-title').value = state.title;
            document.getElementById('inp-email').value = state.email;
            document.getElementById('inp-phone').value = state.phone;
            document.getElementById('inp-location').value = state.location;
            document.getElementById('inp-linkedin').value = state.linkedin;
            document.getElementById('inp-website').value = state.website;
            document.getElementById('inp-summary').value = state.summary;
            document.getElementById('inp-skills').value = state.skills;
            
            renderExpEditor();
            renderEduEditor();
            renderProjectEditor();
            renderAdditionalEditor();
        }

        // Render Experience Dynamic Fields
        function renderExpEditor() {
            const container = document.getElementById('experience-editor-container');
            container.innerHTML = state.experiences.map((exp, index) => `
                <div class="bg-gray-50 p-4 rounded-lg border border-gray-200 relative group transition-all">
                    <button onclick="removeExp(${index})" class="absolute top-2 right-2 text-red-500 hover:bg-red-100 p-1 rounded opacity-0 group-hover:opacity-100 transition-opacity" title="Remove">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                    <div class="grid grid-cols-1 gap-3">
                        <input type="text" placeholder="Job Title" oninput="updateExp(${index}, 'title', this.value)" value="${exp.title}" class="w-full p-2 text-sm border border-gray-300 rounded focus:ring-1 focus:ring-[#d97743] outline-none">
                        <input type="text" placeholder="Company Name" oninput="updateExp(${index}, 'company', this.value)" value="${exp.company}" class="w-full p-2 text-sm border border-gray-300 rounded focus:ring-1 focus:ring-[#d97743] outline-none">
                        <input type="text" placeholder="Dates (e.g. Jan 2020 - Present)" oninput="updateExp(${index}, 'date', this.value)" value="${exp.date}" class="w-full p-2 text-sm border border-gray-300 rounded focus:ring-1 focus:ring-[#d97743] outline-none">
                        <textarea placeholder="Job Description (Line breaks become bullet points)" oninput="updateExp(${index}, 'description', this.value)" rows="3" class="w-full p-2 text-sm border border-gray-300 rounded focus:ring-1 focus:ring-[#d97743] outline-none resize-none">${exp.description || ''}</textarea>
                    </div>
                </div>
            `).join('');
        }

        // Render Education Dynamic Fields
        function renderEduEditor() {
            const container = document.getElementById('education-editor-container');
            container.innerHTML = state.educations.map((edu, index) => `
                <div class="bg-gray-50 p-4 rounded-lg border border-gray-200 relative group transition-all">
                    <button onclick="removeEdu(${index})" class="absolute top-2 right-2 text-red-500 hover:bg-red-100 p-1 rounded opacity-0 group-hover:opacity-100 transition-opacity" title="Remove">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                    <div class="grid grid-cols-1 gap-3">
                        <input type="text" placeholder="Degree / Certificate" oninput="updateEdu(${index}, 'degree', this.value)" value="${edu.degree}" class="w-full p-2 text-sm border border-gray-300 rounded focus:ring-1 focus:ring-[#d97743] outline-none">
                        <input type="text" placeholder="School / University" oninput="updateEdu(${index}, 'school', this.value)" value="${edu.school}" class="w-full p-2 text-sm border border-gray-300 rounded focus:ring-1 focus:ring-[#d97743] outline-none">
                        <input type="text" placeholder="Year / Dates" oninput="updateEdu(${index}, 'date', this.value)" value="${edu.date}" class="w-full p-2 text-sm border border-gray-300 rounded focus:ring-1 focus:ring-[#d97743] outline-none">
                    </div>
                </div>
            `).join('');
        }

        // Render Projects Dynamic Fields
        function renderProjectEditor() {
            const container = document.getElementById('projects-editor-container');
            container.innerHTML = state.projects.map((proj, index) => `
                <div class="bg-gray-50 p-4 rounded-lg border border-gray-200 relative group transition-all">
                    <button onclick="removeProject(${index})" class="absolute top-2 right-2 text-red-500 hover:bg-red-100 p-1 rounded opacity-0 group-hover:opacity-100 transition-opacity" title="Remove">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                    <div class="grid grid-cols-1 gap-3">
                        <input type="text" placeholder="Project Title" oninput="updateProject(${index}, 'title', this.value)" value="${proj.title}" class="w-full p-2 text-sm border border-gray-300 rounded focus:ring-1 focus:ring-[#d97743] outline-none">
                        <input type="text" placeholder="Project Link / URL" oninput="updateProject(${index}, 'link', this.value)" value="${proj.link}" class="w-full p-2 text-sm border border-gray-300 rounded focus:ring-1 focus:ring-[#d97743] outline-none">
                        <textarea placeholder="Description (Line breaks become bullet points)" oninput="updateProject(${index}, 'description', this.value)" rows="3" class="w-full p-2 text-sm border border-gray-300 rounded focus:ring-1 focus:ring-[#d97743] outline-none resize-none">${proj.description}</textarea>
                    </div>
                </div>
            `).join('');
        }

        // Render Additional Dynamic Fields
        function renderAdditionalEditor() {
            const container = document.getElementById('additional-editor-container');
            container.innerHTML = state.additionals.map((add, index) => `
                <div class="bg-gray-50 p-4 rounded-lg border border-gray-200 relative group transition-all">
                    <button onclick="removeAdditional(${index})" class="absolute top-2 right-2 text-red-500 hover:bg-red-100 p-1 rounded opacity-0 group-hover:opacity-100 transition-opacity" title="Remove">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                    <div class="grid grid-cols-1 gap-3">
                        <input type="text" placeholder="Category (e.g., Languages, Certifications)" oninput="updateAdditional(${index}, 'category', this.value)" value="${add.category}" class="w-full p-2 text-sm border border-gray-300 rounded focus:ring-1 focus:ring-[#d97743] outline-none">
                        <textarea placeholder="Details (Line breaks become bullet points)" oninput="updateAdditional(${index}, 'details', this.value)" rows="2" class="w-full p-2 text-sm border border-gray-300 rounded focus:ring-1 focus:ring-[#d97743] outline-none resize-none">${add.details}</textarea>
                    </div>
                </div>
            `).join('');
        }

        // Render The Actual Resume Template
        function renderPreview() {
            const preview = document.getElementById('resume-preview');
            
            const fullName = [state.firstName, state.lastName].filter(Boolean).join(' ');

            // Format experience bullets
            let experiencesHTML = '';
            if (state.experiences.length > 0 && state.experiences.some(exp => exp.title || exp.company)) {
                experiencesHTML = state.experiences.map(exp => {
                    const bullets = exp.description
                        ? exp.description.split('\n').filter(line => line.trim() !== '').map(line => `<li class="ml-4 list-disc text-gray-700 mt-1">${line}</li>`).join('')
                        : '';
                    return `
                        <div class="mb-4">
                            <div class="flex justify-between items-baseline mb-1">
                                <h3 class="font-bold text-gray-800 text-[15px]">${exp.title}</h3>
                                <span class="text-gray-600 font-medium text-xs whitespace-nowrap ml-2">${exp.date}</span>
                            </div>
                            <div class="text-gray-700 italic mb-2">${exp.company}</div>
                            <ul class="text-[13px] leading-relaxed">
                                ${bullets}
                            </ul>
                        </div>
                    `;
                }).join('');
            } else {
                experiencesHTML = `<p class="text-[13px] text-gray-500 italic">Add work experience on the left</p>`;
            }

            // Format education
            let educationHTML = '';
            if (state.educations.length > 0 && state.educations.some(edu => edu.degree || edu.school)) {
                educationHTML = state.educations.map(edu => `
                    <div class="mb-3">
                        <div class="flex justify-between items-baseline mb-1">
                            <h3 class="font-bold text-gray-800 text-[15px]">${edu.degree}</h3>
                            <span class="text-gray-600 font-medium text-xs whitespace-nowrap ml-2">${edu.date}</span>
                        </div>
                        <div class="text-gray-700">${edu.school}</div>
                    </div>
                `).join('');
            } else {
                educationHTML = `<p class="text-[13px] text-gray-500 italic">Add education on the left</p>`;
            }

            // Format projects
            let projectsHTML = '';
            if (state.projects.length > 0 && state.projects.some(proj => proj.title)) {
                projectsHTML = state.projects.map(proj => {
                    const bullets = proj.description
                        ? proj.description.split('\n').filter(line => line.trim() !== '').map(line => `<li class="ml-4 list-disc text-gray-700 mt-1">${line}</li>`).join('')
                        : '';
                    const linkHTML = proj.link ? `<a href="${proj.link.startsWith('http') ? proj.link : 'https://' + proj.link}" target="_blank" class="text-blue-600 hover:underline text-xs ml-2">${proj.link}</a>` : '';
                    
                    return `
                        <div class="mb-4">
                            <div class="flex items-baseline mb-1">
                                <h3 class="font-bold text-gray-800 text-[15px]">${proj.title}</h3>
                                ${linkHTML}
                            </div>
                            <ul class="text-[13px] leading-relaxed">
                                ${bullets}
                            </ul>
                        </div>
                    `;
                }).join('');
            }

            // Format skills
            const skillsArr = state.skills.split(',').filter(s => s.trim() !== '');
            const skillsHTML = skillsArr.length > 0 
                ? `<div class="flex flex-wrap gap-2 mt-2">
                    ${skillsArr.map(skill => `<span class="bg-gray-100 text-gray-800 border border-gray-200 px-2 py-1 rounded text-xs font-medium">${skill.trim()}</span>`).join('')}
                   </div>`
                : '';

            // Format Additional Details
            const additionalsHTML = state.additionals.filter(add => add.category || add.details).map(add => {
                const detailsContent = add.details.includes('\n') 
                    ? `<ul class="text-[13px] leading-relaxed">` + add.details.split('\n').filter(line => line.trim() !== '').map(line => `<li class="ml-4 list-disc text-gray-700 mt-1">${line}</li>`).join('') + `</ul>`
                    : `<div class="text-[13px] text-gray-700">${add.details}</div>`;
                
                return `
                    <div class="mb-3">
                        <h3 class="font-bold text-gray-800 text-[15px] mb-1">${add.category}</h3>
                        ${detailsContent}
                    </div>
                `;
            }).join('');

            // Contact items list
            const contactItems = [];
            if (state.email) contactItems.push(`<span class="flex items-center gap-1.5"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>${state.email}</span>`);
            if (state.phone) contactItems.push(`<span class="flex items-center gap-1.5"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>${state.phone}</span>`);
            if (state.location) contactItems.push(`<span class="flex items-center gap-1.5"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>${state.location}</span>`);
            if (state.linkedin) contactItems.push(`<span class="flex items-center gap-1.5"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>${state.linkedin}</span>`);
            if (state.website) contactItems.push(`<span class="flex items-center gap-1.5"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>${state.website}</span>`);

            // Construct full preview HTML
            preview.innerHTML = `
                <!-- Header Component -->
                <div class="mb-8">
                    <h1 class="text-[3.25rem] leading-[1.1] text-black font-serif-name tracking-tight mb-2 font-bold">${fullName || 'Your Name'}</h1>
                    <div class="text-[#d97743] text-sm uppercase tracking-widest font-semibold mb-5">${state.title || 'Professional Title'}</div>
                    
                    <div class="flex flex-wrap gap-x-6 gap-y-2 text-[13px] text-gray-600 mb-6">
                        ${contactItems.join('')}
                    </div>
                </div>

                <!-- Summary Section -->
                ${state.summary ? `
                <div class="mb-6">
                    <p class="text-[13px] text-gray-700 leading-relaxed text-justify">${state.summary}</p>
                </div>
                ` : ''}

                <!-- Experience Section -->
                <div class="mb-8">
                    <h2 class="section-title">Experience</h2>
                    ${experiencesHTML}
                </div>

                <!-- Education Section -->
                <div class="mb-8">
                    <h2 class="section-title">Education</h2>
                    ${educationHTML}
                </div>

                <!-- Projects Section -->
                ${projectsHTML ? `
                <div class="mb-8">
                    <h2 class="section-title">Projects</h2>
                    ${projectsHTML}
                </div>
                ` : ''}

                <!-- Skills Section -->
                ${skillsHTML ? `
                <div class="mb-8">
                    <h2 class="section-title">Skills</h2>
                    ${skillsHTML}
                </div>
                ` : ''}

                <!-- Additional Section -->
                ${additionalsHTML ? `
                <div>
                    <h2 class="section-title">Additional Information</h2>
                    ${additionalsHTML}
                </div>
                ` : ''}
            `;
        }

        // Auto-scale preview for mobile screens
        function autoScalePreview() {
            const previewPanel = document.getElementById('preview-panel');
            const wrapper = document.getElementById('preview-wrapper');
            if (!previewPanel || !wrapper) return;
            
            const panelWidth = previewPanel.clientWidth;
            // A4 doc max-width is 21cm, ~794px. Plus padding.
            const docWidth = 794; 
            
            if (panelWidth < docWidth + 40) {
                const scale = (panelWidth - 40) / docWidth;
                setZoom(scale);
            } else if (window.innerWidth < 768) {
                setZoom(0.70);
            } else if (currentZoom < 0.5) { // Reset if we come back to desktop
                setZoom(0.85);
            }
        }

        // Initialize Application on Load
        window.addEventListener('DOMContentLoaded', () => {
            initEditor();
            renderPreview();
            autoScalePreview();
        });

        // Keep preview scaled correctly on window resize
        window.addEventListener('resize', autoScalePreview);

    </script>
</body>
</html>
